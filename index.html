
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Budget Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json,{%22name%22:%22Taxi%20Budget%20Tracker%22,%22short_name%22:%22TaxiBudget%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#121212%22}">
    
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --accent: #03dac6;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #2c2c2c;
            --grid-day-bg: #252525;
            --grid-weekend-bg: #161616;
        }
        [data-theme="light"] {
            --bg: #f2f2f7;
            --surface: #ffffff;
            --primary: #6200ee;
            --accent: #018786;
            --text: #1c1c1e;
            --text-muted: #8e8e93;
            --border: #e5e5ea;
            --grid-day-bg: #eaeaea;
            --grid-weekend-bg: #f2f2f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 8px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        h1 { font-size: 1.1rem; color: var(--primary); }
        .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        
        .card { background: var(--surface); border-radius: 10px; border: 1px solid var(--border); padding: 10px; }
        
        .meta-text { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-bottom: 6px; display: flex; justify-content: space-between; padding: 0 4px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .header-cell { text-align: center; font-size: 0.7rem; font-weight: bold; color: var(--text-muted); text-transform: uppercase; padding-bottom: 2px; }
        
        .day-box { background: var(--grid-day-bg); border-radius: 6px; padding: 4px; min-height: 52px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid transparent; }
        .day-box.weekend { background: var(--grid-weekend-bg); opacity: 0.4; }
        .day-box.today { border-color: var(--primary); background: linear-gradient(145deg, var(--bg), var(--grid-day-bg)); }
        
        .day-num { font-size: 0.75rem; font-weight: bold; color: var(--text); }
        .day-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-align: center; font-size: 0.75rem; padding: 1px 0; border-radius: 4px; -moz-appearance: textfield; }
        .day-input::-webkit-outer-spin-button, .day-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .day-input:focus { border-color: var(--primary); outline: none; }
        .day-input:disabled { background: transparent; border: none; color: transparent; }

        .total-box { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: linear-gradient(145deg, var(--surface), var(--bg)); border: 1px solid var(--primary); }
        .total-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .grand-total { font-size: 1.6rem; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Taxi Budget Tracker</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Light</button>
    </div>

    <div class="card">
        <div class="meta-text">
            <span id="date-range-display">Loading window...</span>
            <span id="forecast-summary" style="font-weight: bold; color: var(--primary);">0 Days</span>
        </div>
        
        <div class="calendar-grid" id="calendar-header-row"></div>
        <div class="calendar-grid" id="calendar-days-grid" style="margin-top: 4px;"></div>
    </div>

    <div class="card total-box">
        <span class="total-label">Total Forecast Budget</span>
        <span class="grand-total" id="grand-out">R0.00</span>
    </div>
</div>

<script>
    const startYear = 2026;
    const startMonth = 5; 
    const startDay = 26;

    const storageKey = 'taxi_calendar_presets_v5';
    const dayNamesShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function getDefaultRateForDay(dayOfWeek) {
        if (dayOfWeek === 1 || dayOfWeek === 5) return 81; 
        if (dayOfWeek >= 2 && dayOfWeek <= 4) return 66;  
        return 0;                                         
    }

    let theme = localStorage.getItem('theme') || 'dark';
    let customOverrides = JSON.parse(localStorage.getItem(storageKey)) || {};

    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('theme-btn').innerText = theme === 'dark' ? 'Light' : 'Dark';

    function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('theme-btn').innerText = theme === 'dark' ? 'Light' : 'Dark';
        localStorage.setItem('theme', theme);
    }

    function initTracker() {
        const today = new Date(startYear, startMonth, startDay);
        
        let targetYear = today.getFullYear();
        let targetMonth = today.getMonth() + 1;
        if (targetMonth > 11) {
            targetMonth = 0;
            targetYear += 1;
        }
        const targetDate = new Date(targetYear, targetMonth, 25);

        const options = { day: 'numeric', month: 'short' };
        document.getElementById('date-range-display').innerText = `${today.toLocaleDateString('en-ZA', options)} - ${targetDate.toLocaleDateString('en-ZA', options)}`;

        const headerContainer = document.getElementById('calendar-header-row');
        headerContainer.innerHTML = '';
        for (let i = 0; i < 7; i++) {
            const dayIndex = (today.getDay() + i) % 7;
            const cell = document.createElement('div');
            cell.className = 'header-cell';
            cell.innerText = dayNamesShort[dayIndex];
            headerContainer.appendChild(cell);
        }

        const gridContainer = document.getElementById('calendar-days-grid');
        gridContainer.innerHTML = '';

        let cursor = new Date(today);
        let totalCommuteDays = 0;

        while (cursor <= targetDate) {
            const currentCursorTime = new Date(cursor);
            const dateStr = currentCursorTime.toISOString().split('T')[0];
            const dayOfWeek = currentCursorTime.getDay();
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

            const dayBox = document.createElement('div');
            dayBox.className = 'day-box';
            if (isWeekend) dayBox.classList.add('weekend');
            if (currentCursorTime.getTime() === today.getTime()) dayBox.classList.add('today');

            const numLabel = document.createElement('div');
            numLabel.className = 'day-num';
            numLabel.innerText = currentCursorTime.getDate();
            dayBox.appendChild(numLabel);

            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'day-input';

            if (isWeekend) {
                input.disabled = true;
            } else {
                totalCommuteDays++;
                const defaultRate = getDefaultRateForDay(dayOfWeek);
                input.value = (customOverrides[dateStr] !== undefined) ? customOverrides[dateStr] : defaultRate;
                input.oninput = () => {
                    customOverrides[dateStr] = parseFloat(input.value) || 0;
                    localStorage.setItem(storageKey, JSON.stringify(customOverrides));
                    calculateTotal();
                };
            }

            dayBox.appendChild(input);
            gridContainer.appendChild(dayBox);
            cursor.setDate(cursor.getDate() + 1);
        }

        document.getElementById('forecast-summary').innerText = `${totalCommuteDays} Days`;
        calculateTotal();
    }

    function calculateTotal() {
        const today = new Date(startYear, startMonth, startDay);
        let targetYear = today.getFullYear();
        let targetMonth = today.getMonth() + 1;
        if (targetMonth > 11) {
            targetMonth = 0;
            targetYear += 1;
        }
        const targetDate = new Date(targetYear, targetMonth, 25);

        let runningSum = 0;
        let cursor = new Date(today);

        while (cursor <= targetDate) {
            const dateStr = cursor.toISOString().split('T')[0];
            const dayOfWeek = cursor.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                const defaultRate = getDefaultRateForDay(dayOfWeek);
                const dayVal = (customOverrides[dateStr] !== undefined) ? customOverrides[dateStr] : defaultRate;
                runningSum += dayVal;
            }
            cursor.setDate(cursor.getDate() + 1);
        }

        document.getElementById('grand-out').innerText = `R${runningSum.toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    window.onload = () => {
        initTracker();
    };
</script>

</body>
</html>
